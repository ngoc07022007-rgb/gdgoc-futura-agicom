services:
  - type: web
    name: agicom-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GOOGLE_API_KEY
        sync: false          # Bạn sẽ điền key này thủ công trên Render Dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
