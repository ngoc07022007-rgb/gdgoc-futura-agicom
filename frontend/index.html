<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgiCom – AI-Powered E-commerce Dashboard</title>
    <meta name="description"
        content="AgiCom Dashboard – Hệ thống Agentic AI hỗ trợ chủ shop quản lý giá, nội dung, chat tự động và phân tích thị trường." />
    <link rel="stylesheet" href="index4.css" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
</head>

<body>

    <!-- ===== Toast Container ===== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ===== Scanning Overlay ===== -->
    <div class="scan-overlay" id="scanOverlay">
        <div class="scan-content">
            <div class="scan-icon"><svg viewBox="0 0 24 24" width="48" height="48" stroke="#9CA3AF" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></div>
            <div class="scan-text">Đang phân tích thị trường...</div>
            <div class="scan-subtext">AI đang quét dữ liệu đối thủ và đề xuất chiến lược</div>
            <div class="scan-progress">
                <div class="scan-progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- ===== Feedback Modal ===== -->
    <div class="modal-overlay" id="feedbackModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Từ chối đề xuất</h3>
                <button class="modal-close-btn" id="modalCloseBtn" aria-label="Close">✕</button>
            </div>
            <div class="modal-body">
                <label for="feedbackText">Vui lòng cho biết lý do từ chối:</label>
                <textarea id="feedbackText"
                    placeholder="Nhập lý do tại đây... (VD: Giá đề xuất quá thấp, chưa phù hợp với chi phí vận hành)"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-cancel" id="modalCancelBtn">Hủy</button>
                <button class="btn-modal-submit" id="modalSubmitBtn" disabled>Gửi & Từ chối</button>
            </div>
        </div>
    </div>

    <!-- ===== App Container ===== -->
    <div class="app-container">

        <!-- ===== Sidebar ===== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon"><svg viewBox="0 0 24 24" width="24" height="24" stroke="#9CA3AF" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M8 9h8M8 13h8M8 17h4"/></svg></div>
                    <div>
                        <div class="sidebar-logo-text">AgiCom</div>
                        <div class="sidebar-logo-badge">Beta v2.0</div>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-label">Tổng quan</div>
                <button class="nav-item active" data-page="dashboard" id="nav-dashboard">
                    <span class="nav-item-icon"><svg viewBox="0 0 24 24" width="20" height="20" stroke="#9CA3AF" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 13a1 1 0 011-1h3v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6z"/><path d="M10 8a1 1 0 011-1h3v11a1 1 0 01-1 1h-3a1 1 0 01-1-1V8z"/><path d="M17 3a1 1 0 011-1h3v16a1 1 0 01-1 1h-3a1 1 0 01-1-1V3z"/></svg></span>
                    Tổng quan
                </button>
                <button class="nav-item" data-page="ai-suggestions" id="nav-ai-suggestions">
                    <span class="nav-item-icon"><svg viewBox="0 0 24 24" width="20" height="20" stroke="#9CA3AF" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="9"/></svg></span>
                    Đề xuất AI
                    <span class="nav-item-badge" style="background:var(--accent-amber-bg);color:var(--accent-amber);">3</span>
                </button>
                <button class="nav-item" data-page="revenue" id="nav-revenue">
                    <span class="nav-item-icon"><svg viewBox="0 0 24 24" width="20" height="20" stroke="#9CA3AF" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h.008v.008h-.008v-.008zm2 0h.008v.008h-.008v-.008z"/><path d="M2.25 5.25A3 3 0 015.25 2.25h13.5A3 3 0 0121.75 5.25v13.5A3 3 0 0118.75 21.75H5.25a3 3 0 01-3-3V5.25z"/></svg></span>
                    Doanh thu & Chi phí
                </button>
                <button class="nav-item" data-page="inventory" id="nav-inventory">
                    <span class="nav-item-icon"><svg viewBox="0 0 24 24" width="20" height="20" stroke="#9CA3AF" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7v10a5 5 0 005 5h10a5 5 0 005-5V7l-10-5z"/><path d="M12 22v-7M12 15L2 10M12 15l10-5"/></svg></span>
                    Tồn kho
                    <span class="nav-item-badge"
                        style="background:var(--accent-amber-bg);color:var(--accent-amber);">5</span>
                </button>

                <div class="nav-section-label">Phân tích</div>
                <button class="nav-item" data-page="competitor" id="nav-competitor">
                    <span class="nav-item-icon"><svg viewBox="0 0 24 24" width="20" height="20" stroke="#9CA3AF" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="9"/></svg></span>
                    Phân tích đối thủ
                </button>

                <button class="nav-item" data-page="reviews" id="nav-reviews">
                    <span class="nav-item-icon"><svg viewBox="0 0 24 24" width="20" height="20" stroke="#9CA3AF" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></span>
                    Review sản phẩm
                    <span class="nav-item-badge">12</span>
                </button>
                <button class="nav-item" data-page="media" id="nav-media">
                    <span class="nav-item-icon"><svg viewBox="0 0 24 24" width="20" height="20" stroke="#9CA3AF" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="13" rx="2.18" ry="2.18"/><line x1="7" y1="3" x2="7" y2="7"/><line x1="12" y1="3" x2="12" y2="7"/><line x1="17" y1="3" x2="17" y2="7"/><line x1="7" y1="20" x2="7" y2="24"/><line x1="12" y1="20" x2="12" y2="24"/><line x1="17" y1="20" x2="17" y2="24"/></svg></span>
                    Media & Quảng cáo
                </button>

                <div class="nav-section-label">Hỗ trợ</div>
                <button class="nav-item" data-page="chat" id="nav-chat">
                    <span class="nav-item-icon"><svg viewBox="0 0 24 24" width="20" height="20" stroke="#9CA3AF" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 12l4 4 4-4M12 20c4.418 0 8-1.79 8-4s-3.582-4-8-4-8 1.79-8 4c0 1.204.574 2.336 1.5 3.234L8 20H3c0 0-1-4 3-6C4.574 9.336 4 8.204 4 7 4 3.79 7.582 2 12 2s8 1.79 8 4"/><path d="M3 20l1.5-3.234C3.574 14.336 3 13.204 3 12c0-2.21 1.79-4 4-4"/></svg></span>
                    Chat AI thông minh
                    <span class="nav-item-badge"
                        style="background:var(--accent-emerald-bg);color:var(--accent-emerald);">Auto</span>
                </button>

                <button class="nav-item" data-page="settings" id="nav-settings">
                    <span class="nav-item-icon"><svg viewBox="0 0 24 24" width="20" height="20" stroke="#9CA3AF" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24M15.54 15.54l4.24 4.24M1 12h6m6 0h6M4.22 19.78l4.24-4.24M15.54 8.46l4.24-4.24"/></svg></span>
                    Cài đặt & Hồ sơ
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="sidebar-user-avatar">SP</div>
                    <div class="sidebar-user-info">
                        <div class="sidebar-user-name">Shop PhoneMax</div>
                        <div class="sidebar-user-role">Gói Premium · Shopee & TikTok</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ===== Main Content ===== -->
        <main class="main-content">

            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <div class="header-title-area">
                        <h1 id="pageTitle">Dashboard</h1>
                        <p id="pageSubtitle">Tổng quan chiến lược AI – Cập nhật lúc 00:12, 10/04/2026</p>
                    </div>
                </div>
                <div class="header-right">
                    <button class="btn-scan" id="btnScan">
                        <span class="btn-scan-text"><svg viewBox="0 0 24 24" width="16" height="16" stroke="#451a03" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;margin-right:4px"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg> Quét thị trường</span>
                        <span class="btn-scan-loading"><span class="spinner"></span> Đang quét...</span>
                    </button>
                    <button class="header-icon-btn" id="btnNotification" aria-label="Notifications">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="#1e293b" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 17H3v-2m0 0V5m0 10h2m12-2l.01.01M17.5 4h.5m0 14h-2m6-6l.01.01"/></svg>
                        <span class="notification-dot"></span>
                    </button>
                </div>
            </header>

            <!-- ===== Strategic Guidance Toolbar ===== -->
            <div class="guidance-toolbar" id="guidanceToolbar">
                <div class="guidance-inner">
                    <div class="guidance-icon"><svg viewBox="0 0 24 24" width="20" height="20" stroke="#9CA3AF" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg></div>
                    <input type="text" class="guidance-input" id="guidanceInput"
                        placeholder='Nhập chỉ thị chiến lược... (VD: "Ưu tiên xả kho Galaxy A55 tuần này", "Giữ biên lợi nhuận iPhone ≥ 10%")' />
                    <button class="guidance-send-btn" id="guidanceSendBtn">Gửi cho AI ➜</button>
                </div>
                <div class="guidance-tags" id="guidanceTags">
                    <button class="guidance-tag" data-cmd="Ưu tiên đẩy mạnh xả kho sản phẩm tồn lâu nhất">
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="16" rx="2" ry="2"/><path d="M9 9h6M9 15h6"/>
                        </svg>
                        Xả kho
                    </button>
                    <button class="guidance-tag" data-cmd="Tập trung giữ vững biên lợi nhuận ≥ 10% cho tất cả sản phẩm">
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/>
                        </svg>
                        Giữ biên LN
                    </button>
                    <button class="guidance-tag" data-cmd="Tập trung cạnh tranh giá với MobileWorld Store tuần này">
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                        Đấu giá đối thủ
                    </button>
                    <button class="guidance-tag" data-cmd="Tối ưu SEO toàn bộ tiêu đề sản phẩm theo keyword Shopee trending">
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
                        </svg>
                        SEO toàn bộ
                    </button>
                    <button class="guidance-tag" data-cmd="Đẩy mạnh Flash Sale cuối tuần cho Samsung">
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                        </svg>
                        Flash Sale
                    </button>
                </div>
                <div class="guidance-active-cmd" id="guidanceActiveCmd" style="display:none;">
                    <span class="guidance-active-label"><svg viewBox="0 0 24 24" width="16" height="16" stroke="#9CA3AF" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;margin-right:4px"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M8 9h8M8 13h8M8 17h4"/></svg> AI đang ưu tiên:</span>
                    <span class="guidance-active-text" id="guidanceActiveCmdText"></span>
                    <button class="guidance-clear-btn" id="guidanceClearBtn">✕ Hủy</button>
                </div>
            </div>

            <!-- Page Content (all pages rendered here by JS) -->
            <div class="page-content" id="pageContent">
                <!-- Dynamic content rendered by app.js -->
            </div>

        </main>
    </div>

    <script src="app4.js"></script>
</body>

</html>
